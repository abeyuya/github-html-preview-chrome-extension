name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package extension
        run: cd dist && zip -r "../github-html-preview-local-${{ github.ref_name }}.zip" .

      - name: Create release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: github-html-preview-local-${{ github.ref_name }}.zip
          generate_release_notes: true
